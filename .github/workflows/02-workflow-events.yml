name: 02 - Eventos
on: 
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * *' # Ejecuta el workflow todos los días a medianoche
  workflow_dispatch: # Permite disparar manualmente o workflow

jobs:
  echo:
    runs-on: ubuntu-latest
    steps:
      - name: ShowTrigger
        run: echo "${{ github.event_name }}"