name: 02 - Eventos
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Agendado para ejecutarse una única vez el día 03 de marzo de 2026 a las 18:10 UTC
    - cron: '10 18 3 3 *'

jobs:
  echo:
    runs-on: ubuntu-latest
    steps:
      - name: ShowTrigger
        run: |
          echo "Evento: ${{ github.event_name }}"